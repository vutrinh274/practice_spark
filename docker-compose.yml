services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  spark-connect:
    image: apache/spark:4.0.0
    container_name: spark-connect
    hostname: spark-connect
    expose:
      - "15002"
    volumes:
      - ./packages/problems:/problems:rw
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: >
      /opt/spark/sbin/start-connect-server.sh
      --packages "org.apache.spark:spark-connect_2.13:4.0.0"
      --conf "spark.driver.extraJavaOptions=-Divy.cache.dir=/tmp -Divy.home=/tmp"
      --master "local[*]"
      --conf spark.scheduler.mode=FAIR
      --conf spark.connect.session.ttl=1h
    healthcheck:
      disable: true

  api:
    build:
      context: ./apps/api
    container_name: api
    expose:
      - "8000"
    environment:
      - SPARK_CONNECT_URL=sc://spark-connect:15002
      - SPARK_PROBLEMS_DIR=/problems
      - PROBLEMS_DIR=/problems
      - DB_PATH=/app/data/spark_practice.db
    volumes:
      - db_data:/app/data
      - ./packages/problems:/problems:rw

    depends_on:
      - spark-connect
    restart: unless-stopped

volumes:
  db_data:
    driver: local
