events {
    worker_connections 1024;
}

http {
    # Trust Cloudflare's real IP forwarding (keep in case you add Cloudflare later)
    real_ip_header CF-Connecting-IP;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.vutrinh.net;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.vutrinh.net;

        ssl_certificate /etc/letsencrypt/live/api.vutrinh.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.vutrinh.net/privkey.pem;

        location / {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }
    }
}
