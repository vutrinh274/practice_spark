id: flatten_structs
title: Flatten Nested Structs
difficulty: hard
tags:
  - structs
  - getField
  - spark specific

datasets:
  - name: orders
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  orders:
    - { column: order_id, type: INT }
    - { column: customer_name, type: STRING }
    - { column: address, type: STRING }
    - { column: items_count, type: INT }
