id: standardize_phones
title: Standardize Phone Numbers
difficulty: medium
tags:
  - regexp_replace
  - string functions

datasets:
  - name: contacts
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  contacts:
    - { column: contact_id, type: INT }
    - { column: name, type: STRING }
    - { column: phone, type: STRING }
