    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  user_purchases:
    - { column: user_id, type: INT }
    - { column: purchase_date, type: STRING }
    - { column: items, type: STRING }
