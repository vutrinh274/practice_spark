id: categorize_by_price
title: Categorize by Price
difficulty: easy
tags:
  - case when
  - conditional logic

datasets:
  - name: products
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/syntax.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  products:
    - { column: product_id, type: INT }
    - { column: product_name, type: STRING }
    - { column: category, type: STRING }
    - { column: price, type: INT }
