id: increasing_yoy_sales
title: Products with Increasing YoY Sales
difficulty: hard
tags:
  - window functions
  - lag
  - year over year

datasets:
  - name: product_sales
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  product_sales:
    - { column: product_id, type: INT }
    - { column: product_name, type: STRING }
    - { column: year, type: INT }
    - { column: total_sales, type: INT }
