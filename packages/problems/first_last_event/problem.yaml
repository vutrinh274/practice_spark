id: first_last_event
title: First and Last Event per User
difficulty: medium
tags:
  - aggregation
  - min max

datasets:
  - name: user_events
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  user_events:
    - { column: event_id, type: INT }
    - { column: user_id, type: INT }
    - { column: event_date, type: STRING }
    - { column: event_type, type: STRING }
