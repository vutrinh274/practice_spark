id: active_subscriptions
title: Active Subscriptions on a Date
difficulty: medium
tags:
  - date functions
  - date range

datasets:
  - name: subscriptions
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  subscriptions:
    - { column: sub_id, type: INT }
    - { column: customer_id, type: INT }
    - { column: start_date, type: STRING }
    - { column: end_date, type: STRING }
    - { column: plan, type: STRING }
