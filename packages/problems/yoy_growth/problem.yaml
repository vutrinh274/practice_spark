id: yoy_growth
title: Year-over-Year Revenue Growth
difficulty: hard
tags:
  - window functions
  - lag
  - year over year

datasets:
  - name: annual_revenue
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  annual_revenue:
    - { column: year, type: INT }
    - { column: category, type: STRING }
    - { column: revenue, type: INT }
