id: combine_tables
title: Combine Two Tables
difficulty: easy
tags:
  - union
  - set operations

datasets:
  - name: orders_2023
    source: csv
    path: ./fixture_2023.csv
  - name: orders_2024
    source: csv
    path: ./fixture_2024.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/union.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  orders_2023:
    - { column: order_id, type: INT }
    - { column: customer_id, type: INT }
    - { column: amount, type: INT }
    - { column: year, type: INT }
  orders_2024:
    - { column: order_id, type: INT }
    - { column: customer_id, type: INT }
    - { column: amount, type: INT }
    - { column: year, type: INT }
