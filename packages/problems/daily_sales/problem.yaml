id: daily_sales
title: Daily Sales Total
difficulty: easy
tags:
  - aggregation
  - groupby
  - date functions

datasets:
  - name: sales
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/groupby.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  sales:
    - { column: sale_id, type: INT }
    - { column: store_id, type: INT }
    - { column: sale_date, type: STRING }
    - { column: amount, type: INT }
