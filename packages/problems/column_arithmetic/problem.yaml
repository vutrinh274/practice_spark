id: column_arithmetic
title: Column Arithmetic
difficulty: easy
tags:
  - derived columns
  - arithmetic
  - rounding

datasets:
  - name: products
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/round.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  products:
    - { column: product_id, type: INT }
    - { column: product_name, type: STRING }
    - { column: price, type: INT }
    - { column: quantity, type: INT }
    - { column: discount_pct, type: INT }
