id: salary_vs_dept_avg
title: Employee Salary vs Department Average
difficulty: medium
tags:
  - window functions
  - avg over partition

datasets:
  - name: employees
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  employees:
    - { column: employee_id, type: INT }
    - { column: name, type: STRING }
    - { column: department, type: STRING }
    - { column: salary, type: INT }
