id: full_outer_join
title: Full Outer Join
difficulty: medium
tags:
  - joins
  - full outer join
  - null handling

datasets:
  - name: employees
    source: csv
    path: ./employees.csv
  - name: departments
    source: csv
    path: ./departments.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/syntax.md
  - ./hints/coalesce.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  employees:
    - { column: employee_id, type: INT }
    - { column: name, type: STRING }
    - { column: department_id, type: INT }
  departments:
    - { column: department_id, type: INT }
    - { column: department_name, type: STRING }
    - { column: budget, type: INT }
