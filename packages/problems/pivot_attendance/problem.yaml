id: pivot_attendance
title: Pivot Attendance by Status
difficulty: medium
tags:
  - pivot
  - aggregation

datasets:
  - name: attendance
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  attendance:
    - { column: employee_id, type: INT }
    - { column: attendance_date, type: STRING }
    - { column: status, type: STRING }
