id: tally_election
title: Tally Election Results
difficulty: hard
tags:
  - aggregation
  - ranking
  - dense_rank

datasets:
  - name: votes
    source: csv
    path: fixture.csv
    schema:
      vote_id: int
      voter_id: int
      candidate: string
      district: string

validation:
  method: dataframe_equal_ordered
  ordered: true
  type_coerce: true

expected_output: expected.csv

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md
