id: aggregate_tags
title: Aggregate Tags into Array
difficulty: medium
tags:
  - collect_list
  - spark specific

datasets:
  - name: products
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  products:
    - { column: product_id, type: INT }
    - { column: product_name, type: STRING }
    - { column: tag, type: STRING }
