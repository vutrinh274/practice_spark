id: string_basics
title: String Basics
difficulty: easy
tags:
  - string functions
  - data cleaning

datasets:
  - name: customers
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/functions.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  customers:
    - { column: customer_id, type: INT }
    - { column: first_name, type: STRING }
    - { column: last_name, type: STRING }
    - { column: email, type: STRING }
    - { column: city, type: STRING }
