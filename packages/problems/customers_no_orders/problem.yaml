id: customers_no_orders
title: Customers with No Orders
difficulty: medium
tags:
  - joins
  - anti-join
  - left join

datasets:
  - name: customers
    source: csv
    path: ./customers.csv
  - name: orders
    source: csv
    path: ./orders.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/left_join.md
  - ./hints/null_filter.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  customers:
    - { column: customer_id, type: INT }
    - { column: name, type: STRING }
    - { column: city, type: STRING }
    - { column: signup_date, type: STRING }
  orders:
    - { column: order_id, type: INT }
    - { column: customer_id, type: INT }
    - { column: amount, type: INT }
