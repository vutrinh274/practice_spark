id: top_customers_region
title: Top Customers by Region
difficulty: hard
tags:
  - window functions
  - rank
  - nested partition

datasets:
  - name: customers
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  customers:
    - { column: customer_id, type: INT }
    - { column: name, type: STRING }
    - { column: region, type: STRING }
    - { column: total_spend, type: INT }
