id: most_common_tag
title: Most Common Tag per Category
difficulty: hard
tags:
  - explode
  - rank
  - spark specific

datasets:
  - name: articles
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  articles:
    - { column: article_id, type: INT }
    - { column: title, type: STRING }
    - { column: category, type: STRING }
    - { column: tags, type: STRING }
