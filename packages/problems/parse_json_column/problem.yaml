id: parse_json_column
title: Parse JSON Column
difficulty: hard
tags:
  - json
  - from_json
  - spark specific

datasets:
  - name: events
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  events:
    - { column: event_id, type: INT }
    - { column: user_id, type: INT }
    - { column: event_type, type: STRING }
    - { column: properties, type: STRING }
