id: sessionize_clickstream
title: Sessionize Clickstream Data
difficulty: hard
tags:
  - window functions
  - session
  - lag

datasets:
  - name: clickstream
    source: csv
    path: fixture.csv
    schema:
      event_id: int
      user_id: int
      page: string
      event_time: string

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md
