id: explode_tags
title: Explode Tags to Rows
difficulty: medium
tags:
  - explode
  - array to rows

datasets:
  - name: products_with_arrays
    source: csv
    path: ./fixture.csv

validation:
  strategy: dataframe_equal_ordered
  ordered: true
  type_coerce: true

reference:
  solution: ./reference.py

hints:
  - ./hints/concept.md
  - ./hints/approach.md
  - ./hints/query.md

solution:
  sql: ./solutions/sql.md
  dataframe: ./solutions/dataframe.md

schema:
  products_with_arrays:
    - { column: product_id, type: INT }
    - { column: product_name, type: STRING }
    - { column: tags, type: STRING }
